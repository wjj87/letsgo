<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网吧上网计费系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .pc-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .pc {
            aspect-ratio: 1;
            background: #2ecc71;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pc:hover {
            transform: scale(1.05);
        }
        .pc.occupied {
            background: #e74c3c;
        }
        .pc.selected {
            background: #f39c12;
            box-shadow: 0 0 15px rgba(243,156,18,0.5);
        }
        .pc-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .menu-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }
        .menu-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .menu-title {
            font-size: 16px;
            font-weight: bold;
        }
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .tab-bar {
            display: flex;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            border-bottom: 3px solid #00d4ff;
            color: #00d4ff;
        }
        .balance-display {
            text-align: center;
            font-size: 3em;
            color: #00d4ff;
            margin: 20px 0;
        }
        .recharge-amounts {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .recharge-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .recharge-btn:hover, .recharge-btn.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.2);
        }
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer {
            font-size: 1.5em;
            color: #f39c12;
            font-weight: bold;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 网吧上网计费系统</h1>

        <!-- 登录注册界面 -->
        <div id="authSection" class="section active">
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('login')">登录</div>
                <div class="tab" onclick="switchTab('register')">注册</div>
                <div class="tab" onclick="switchTab('admin')">管理员</div>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn" onclick="userLogin()">登录</button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPassword2" placeholder="请再次输入密码">
                </div>
                <button class="btn" onclick="userRegister()">注册</button>
            </div>

            <!-- 管理员登录 -->
            <div id="adminForm" style="display:none;">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                </div>
                <button class="btn" onclick="adminLogin()">登录</button>
                <p style="color:#888;margin-top:10px;font-size:12px;">提示: 默认密码为 admin123</p>
            </div>
        </div>

        <!-- 用户主界面 -->
        <div id="userSection" class="section">
            <div class="status-bar">
                <div>
                    <span id="currentUser">用户: -</span>
                </div>
                <div>
                    <span id="currentBalance">余额: 0.00 元</span>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="showSection('online')">
                    <div class="menu-icon">💻</div>
                    <div class="menu-title">上机</div>
                </div>
                <div class="menu-item" onclick="offline()">
                    <div class="menu-icon">📴</div>
                    <div class="menu-title">下机</div>
                </div>
                <div class="menu-item" onclick="checkFee()">
                    <div class="menu-icon">💰</div>
                    <div class="menu-title">查费用</div>
                </div>
                <div class="menu-item" onclick="showSection('recharge')">
                    <div class="menu-icon">💳</div>
                    <div class="menu-title">充值</div>
                </div>
                <div class="menu-item" onclick="showSection('history')">
                    <div class="menu-icon">📋</div>
                    <div class="menu-title">记录</div>
                </div>
                <div class="menu-item" onclick="logout()">
                    <div class="menu-icon">🚪</div>
                    <div class="menu-title">退出</div>
                </div>
            </div>
        </div>

        <!-- 上机界面 -->
        <div id="onlineSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">选择电脑</h2>
            
            <div class="pc-legend">
                <div class="legend-item">
                    <div class="legend-color" style="background:#2ecc71;"></div>
                    <span>空闲</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background:#e74c3c;"></div>
                    <span>使用中</span>
                </div>
            </div>

            <div class="pc-grid" id="pcGrid"></div>
            
            <div id="onlineInfo" class="info-card" style="display:none;">
                <h3 style="margin-bottom:15px;">当前上机信息</h3>
                <div class="info-row">
                    <span>电脑编号</span>
                    <span id="onlinePcId">-</span>
                </div>
                <div class="info-row">
                    <span>上机时间</span>
                    <span id="onlineStartTime">-</span>
                </div>
                <div class="info-row">
                    <span>已用时长</span>
                    <span id="onlineDuration" class="timer">0分0秒</span>
                </div>
                <div class="info-row">
                    <span>当前费用</span>
                    <span id="onlineFee">0.00 元</span>
                </div>
            </div>
            
            <div id="selectPcInfo" style="text-align:center;margin:20px 0;">
                <p>请从上方选择一个空闲的电脑上机</p>
            </div>
        </div>

        <!-- 充值界面 -->
        <div id="rechargeSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">账户充值</h2>
            
            <div class="balance-display">
                当前余额: <span id="rechargeBalance">0.00</span> 元
            </div>

            <h3 style="margin:20px 0;text-align:center;">快捷充值</h3>
            <div class="recharge-amounts">
                <button class="recharge-btn" onclick="selectRecharge(10)">10元</button>
                <button class="recharge-btn" onclick="selectRecharge(20)">20元</button>
                <button class="recharge-btn" onclick="selectRecharge(50)">50元</button>
                <button class="recharge-btn" onclick="selectRecharge(100)">100元</button>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>自定义金额</label>
                <input type="number" id="customAmount" placeholder="请输入充值金额">
            </div>

            <button class="btn" onclick="doRecharge()">确认充值</button>
        </div>

        <!-- 消费记录界面 -->
        <div id="historySection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">消费记录</h2>
            <div class="history-list" id="historyList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 管理员界面 -->
        <div id="adminSection" class="section">
            <div class="status-bar">
                <span>管理员模式</span>
                <button class="btn btn-danger" onclick="adminLogout()">退出</button>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="showSection('adminUsers')">
                    <div class="menu-icon">👥</div>
                    <div class="menu-title">用户列表</div>
                </div>
                <div class="menu-item" onclick="showSection('adminRecords')">
                    <div class="menu-icon">📊</div>
                    <div class="menu-title">消费记录</div>
                </div>
                <div class="menu-item" onclick="showSection('adminStats')">
                    <div class="menu-icon">📈</div>
                    <div class="menu-title">系统统计</div>
                </div>
            </div>
        </div>

        <!-- 用户列表 -->
        <div id="adminUsersSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">所有用户</h2>
            <div id="usersTable"></div>
        </div>

        <!-- 消费记录 -->
        <div id="adminRecordsSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">所有消费记录</h2>
            <div id="recordsTable"></div>
        </div>

        <!-- 系统统计 -->
        <div id="adminStatsSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">系统统计</h2>
            <div class="info-card">
                <div class="info-row">
                    <span>用户总数</span>
                    <span id="statUsers">0</span>
                </div>
                <div class="info-row">
                    <span>消费记录</span>
                    <span id="statRecords">0</span>
                </div>
                <div class="info-row">
                    <span>总收入</span>
                    <span id="statRevenue">0.00 元</span>
                </div>
                <div class="info-row">
                    <span>当前在线</span>
                    <span id="statOnline">0 人</span>
                </div>
                <div class="info-row">
                    <span>空闲电脑</span>
                    <span id="statFree">0 台</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="toast" class="modal">
        <div class="modal-content" style="text-align:center;">
            <p id="toastMessage" style="font-size:18px;margin-bottom:20px;"></p>
            <button class="btn" onclick="closeToast()">确定</button>
        </div>
    </div>

    <script>
        // 全局数据
        const RATE_PER_HOUR = 5;
        const MAX_PC = 50;
        
        let currentUser = null;
        let isAdmin = false;
        let users = [];
        let records = [];
        let pcs = [];
        let selectedPc = null;
        let onlineTimer = null;

        // 初始化
        function init() {
            loadData();
            renderPCGrid();
            updateStatus();
        }

        // 加载数据（从localStorage模拟）
        function loadData() {
            const savedUsers = localStorage.getItem('netbar_users');
            const savedRecords = localStorage.getItem('netbar_records');
            const savedPcs = localStorage.getItem('netbar_pcs');

            users = savedUsers ? JSON.parse(savedUsers) : [];
            records = savedRecords ? JSON.parse(savedRecords) : [];
            pcs = savedPcs ? JSON.parse(savedPcs) : initPcs();
        }

        // 初始化电脑状态
        function initPcs() {
            const pcs = [];
            for (let i = 1; i <= MAX_PC; i++) {
                pcs.push({ pc_id: i, is_occupied: false, username: '', start_time: null });
            }
            return pcs;
        }

        // 保存数据
        function saveData() {
            localStorage.setItem('netbar_users', JSON.stringify(users));
            localStorage.setItem('netbar_records', JSON.stringify(records));
            localStorage.setItem('netbar_pcs', JSON.stringify(pcs));
        }

        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('adminForm').style.display = 'none';
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
            } else if (tab === 'register') {
                document.getElementById('registerForm').style.display = 'block';
            } else if (tab === 'admin') {
                document.getElementById('adminForm').style.display = 'block';
            }
        }

        // 显示提示
        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toast').classList.add('active');
        }

        function closeToast() {
            document.getElementById('toast').classList.remove('active');
        }

        // 显示对应版块
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section + 'Section').classList.add('active');

            if (section === 'online') {
                renderPCGrid();
                updateOnlineInfo();
            } else if (section === 'recharge') {
                document.getElementById('rechargeBalance').textContent = currentUser ? currentUser.balance.toFixed(2) : '0.00';
            } else if (section === 'history') {
                renderHistory();
            } else if (section === 'adminUsers') {
                renderUsersTable();
            } else if (section === 'adminRecords') {
                renderRecordsTable();
            } else if (section === 'adminStats') {
                updateStats();
            }

            if (onlineTimer) {
                clearInterval(onlineTimer);
                onlineTimer = null;
            }
            if (section === 'online' && currentUser && currentUser.is_active) {
                onlineTimer = setInterval(updateOnlineInfo, 1000);
            }
        }

        // 用户注册
        function userRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const password2 = document.getElementById('regPassword2').value;

            if (!username || !password) {
                showToast('用户名和密码不能为空！');
                return;
            }
            if (password !== password2) {
                showToast('两次密码输入不一致！');
                return;
            }
            if (users.find(u => u.username === username)) {
                showToast('用户名已存在！');
                return;
            }

            const newUser = {
                username,
                password,
                balance: 0,
                is_active: false,
                pc_id: null,
                login_time: null
            };
            users.push(newUser);
            saveData();
            showToast('注册成功！请登录。');
            
            // 清空表单
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPassword2').value = '';
            switchTab('login');
            document.querySelectorAll('.tab')[0].click();
        }

        // 用户登录
        function userLogin() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            const user = users.find(u => u.username === username && u.password === password);
            if (!user) {
                showToast('用户名或密码错误！');
                return;
            }

            currentUser = user;
            isAdmin = false;
            updateStatus();
            showSection('user');
            showToast('登录成功！');
        }

        // 管理员登录
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password !== 'admin123') {
                showToast('密码错误！');
                return;
            }

            isAdmin = true;
            currentUser = null;
            showSection('admin');
            showToast('管理员登录成功！');
        }

        // 退出登录
        function logout() {
            if (onlineTimer) {
                clearInterval(onlineTimer);
                onlineTimer = null;
            }
            currentUser = null;
            showSection('auth');
        }

        function adminLogout() {
            isAdmin = false;
            showSection('auth');
        }

        // 更新状态栏
        function updateStatus() {
            if (currentUser) {
                document.getElementById('currentUser').textContent = '用户: ' + currentUser.username;
                document.getElementById('currentBalance').textContent = '余额: ' + currentUser.balance.toFixed(2) + ' 元';
            }
        }

        // 渲染电脑网格
        function renderPCGrid() {
            const grid = document.getElementById('pcGrid');
            grid.innerHTML = '';
            
            pcs.forEach((pc, index) => {
                const div = document.createElement('div');
                div.className = 'pc ' + (pc.is_occupied ? 'occupied' : '');
                if (selectedPc === index + 1 && !pc.is_occupied) {
                    div.classList.add('selected');
                }
                div.textContent = pc.pc_id;
                div.onclick = () => selectPc(pc.pc_id);
                grid.appendChild(div);
            });
        }

        // 选择电脑
        function selectPc(pcId) {
            const pc = pcs.find(p => p.pc_id === pcId);
            if (pc.is_occupied) {
                showToast('该电脑已被使用！');
                return;
            }

            if (currentUser.is_active) {
                showToast('您已经在使用电脑 ' + currentUser.pc_id + '！');
                return;
            }

            selectedPc = pcId;
            renderPCGrid();
            
            document.getElementById('selectPcInfo').innerHTML = `
                <p style="color:#f39c12;">已选择电脑 ${pcId} 号</p>
                <button class="btn" onclick="doOnline()">确认上机</button>
            `;
        }

        // 上机
        function doOnline() {
            if (!selectedPc) {
                showToast('请先选择电脑！');
                return;
            }

            // 检查余额
            const minimumBalance = RATE_PER_HOUR;
            if (currentUser.balance < minimumBalance) {
                showToast('余额不足！至少需要 ' + minimumBalance.toFixed(2) + ' 元');
                return;
            }

            // 执行上机
            const pc = pcs.find(p => p.pc_id === selectedPc);
            pc.is_occupied = true;
            pc.username = currentUser.username;
            pc.start_time = Date.now();

            currentUser.is_active = true;
            currentUser.pc_id = selectedPc;
            currentUser.login_time = pc.start_time;

            // 更新用户数据
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            users[userIndex] = { ...currentUser };

            saveData();
            showToast('上机成功！');
            
            updateOnlineInfo();
            renderPCGrid();

            // 启动计时器
            if (onlineTimer) clearInterval(onlineTimer);
            onlineTimer = setInterval(updateOnlineInfo, 1000);
        }

        // 更新上机信息
        function updateOnlineInfo() {
            if (!currentUser || !currentUser.is_active) {
                document.getElementById('onlineInfo').style.display = 'none';
                return;
            }

            document.getElementById('onlineInfo').style.display = 'block';
            document.getElementById('onlinePcId').textContent = currentUser.pc_id;
            
            const startTime = new Date(currentUser.login_time);
            document.getElementById('onlineStartTime').textContent = formatTime(startTime);

            // 计算时长和费用
            const now = Date.now();
            const duration = now - currentUser.login_time;
            const hours = duration / 3600000;
            const fee = hours * RATE_PER_HOUR;

            const mins = Math.floor(duration / 60000);
            const secs = Math.floor((duration % 60000) / 1000);
            document.getElementById('onlineDuration').textContent = `${mins}分${secs}秒`;
            document.getElementById('onlineFee').textContent = fee.toFixed(2) + ' 元';
        }

        // 下机
        function offline() {
            if (!currentUser.is_active) {
                showToast('您当前没有在上机！');
                return;
            }

            const pc = pcs.find(p => p.pc_id === currentUser.pc_id);
            const now = Date.now();
            const duration = now - currentUser.login_time;
            const hours = duration / 3600000;
            const fee = hours * RATE_PER_HOUR;

            // 创建消费记录
            const record = {
                username: currentUser.username,
                pc_id: currentUser.pc_id,
                start_time: currentUser.login_time,
                end_time: now,
                amount: fee
            };
            records.push(record);

            // 更新电脑状态
            pc.is_occupied = false;
            pc.username = '';
            pc.start_time = null;

            // 更新用户状态
            currentUser.is_active = false;
            currentUser.pc_id = null;
            currentUser.login_time = null;

            // 更新数据
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            users[userIndex] = { ...currentUser };

            saveData();
            updateStatus();
            renderPCGrid();

            showToast(`下机成功！消费 ${fee.toFixed(2)} 元`);
        }

        // 查询费用
        function checkFee() {
            if (!currentUser.is_active) {
                showToast('您当前没有在上机！');
                return;
            }

            const duration = Date.now() - currentUser.login_time;
            const hours = duration / 3600000;
            const fee = hours * RATE_PER_HOUR;

            const mins = Math.floor(duration / 60000);
            const secs = Math.floor((duration % 60000) / 1000);

            showToast(`当前费用: ${fee.toFixed(2)} 元\n已用时长: ${mins}分${secs}秒`);
        }

        // 选择充值金额
        function selectRecharge(amount) {
            document.getElementById('customAmount').value = amount;
        }

        // 执行充值
        function doRecharge() {
            const amount = parseFloat(document.getElementById('customAmount').value);
            if (!amount || amount <= 0) {
                showToast('请输入有效的充值金额！');
                return;
            }

            currentUser.balance += amount;
            
            const userIndex = users.findIndex(u => u.username === currentUser.username);
            users[userIndex] = { ...currentUser };

            saveData();
            updateStatus();
            document.getElementById('rechargeBalance').textContent = currentUser.balance.toFixed(2);
            document.getElementById('customAmount').value = '';
            
            showToast(`充值成功！当前余额: ${currentUser.balance.toFixed(2)} 元`);
        }

        // 渲染消费记录
        function renderHistory() {
            const list = document.getElementById('historyList');
            const userRecords = records.filter(r => r.username === currentUser.username);

            if (userRecords.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#888;">暂无消费记录</p>';
                return;
            }

            list.innerHTML = userRecords.map((r, i) => `
                <div class="history-item">
                    <div class="info-row">
                        <span>记录 ${userRecords.length - i}</span>
                        <span>电脑 ${r.pc_id}号</span>
                    </div>
                    <div class="info-row">
                        <span>开始: ${formatTime(new Date(r.start_time))}</span>
                        <span>结束: ${formatTime(new Date(r.end_time))}</span>
                    </div>
                    <div class="info-row">
                        <span>消费金额</span>
                        <span style="color:#2ecc71;">${r.amount.toFixed(2)} 元</span>
                    </div>
                </div>
            `).join('');
        }

        // 渲染用户表
        function renderUsersTable() {
            const table = document.getElementById('usersTable');
            table.innerHTML = `
                <table style="width:100%;border-collapse:collapse;">
                    <tr style="background:rgba(0,212,255,0.2);">
                        <th style="padding:10px;text-align:left;">用户名</th>
                        <th style="padding:10px;">余额</th>
                        <th style="padding:10px;">状态</th>
                        <th style="padding:10px;">电脑</th>
                    </tr>
                    ${users.map(u => `
                        <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
                            <td style="padding:10px;">${u.username}</td>
                            <td style="padding:10px;text-align:center;">${u.balance.toFixed(2)}</td>
                            <td style="padding:10px;text-align:center;color:${u.is_active ? '#e74c3c' : '#2ecc71'};">
                                ${u.is_active ? '上机中' : '空闲'}
                            </td>
                            <td style="padding:10px;text-align:center;">
                                ${u.is_active ? u.pc_id : '-'}
                            </td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        // 渲染消费记录表
        function renderRecordsTable() {
            const table = document.getElementById('recordsTable');
            if (records.length === 0) {
                table.innerHTML = '<p style="text-align:center;color:#888;">暂无消费记录</p>';
                return;
            }

            table.innerHTML = `
                <table style="width:100%;border-collapse:collapse;">
                    <tr style="background:rgba(0,212,255,0.2);">
                        <th style="padding:10px;">用户</th>
                        <th style="padding:10px;">电脑</th>
                        <th style="padding:10px;">金额</th>
                        <th style="padding:10px;">时间</th>
                    </tr>
                    ${records.map(r => `
                        <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
                            <td style="padding:10px;">${r.username}</td>
                            <td style="padding:10px;text-align:center;">${r.pc_id}</td>
                            <td style="padding:10px;text-align:center;color:#2ecc71;">${r.amount.toFixed(2)}</td>
                            <td style="padding:10px;">${formatTime(new Date(r.end_time))}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        // 更新统计
        function updateStats() {
            document.getElementById('statUsers').textContent = users.length;
            document.getElementById('statRecords').textContent = records.length;
            
            const totalRevenue = records.reduce((sum, r) => sum + r.amount, 0);
            document.getElementById('statRevenue').textContent = totalRevenue.toFixed(2) + ' 元';
            
            const onlineUsers = users.filter(u => u.is_active).length;
            document.getElementById('statOnline').textContent = onlineUsers + ' 人';
            document.getElementById('statFree').textContent = (MAX_PC - onlineUsers) + ' 台';
        }

        // 格式化时间
        function formatTime(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            const h = String(date.getHours()).padStart(2, '0');
            const min = String(date.getMinutes()).padStart(2, '0');
            const s = String(date.getSeconds()).padStart(2, '0');
            return `${y}-${m}-${d} ${h}:${min}:${s}`;
        }

        // 启动
        init();
    </script>
</body>
</html>
