<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网吧上网计费系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        .container {
            width: 90%;
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0,212,255,0.5);
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .pc-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .pc {
            aspect-ratio: 1;
            background: #2ecc71;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .pc:hover {
            transform: scale(1.05);
        }
        .pc.occupied {
            background: #e74c3c;
        }
        .pc.selected {
            background: #f39c12;
            box-shadow: 0 0 15px rgba(243,156,18,0.5);
        }
        .pc-legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 15px 0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }
        .info-card {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .menu-item {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .menu-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-5px);
        }
        .menu-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .menu-title {
            font-size: 16px;
            font-weight: bold;
        }
        .history-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .tab-bar {
            display: flex;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab.active {
            border-bottom: 3px solid #00d4ff;
            color: #00d4ff;
        }
        .balance-display {
            text-align: center;
            font-size: 3em;
            color: #00d4ff;
            margin: 20px 0;
        }
        .recharge-amounts {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }
        .recharge-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        .recharge-btn:hover, .recharge-btn.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.2);
        }
        .status-bar {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .timer {
            font-size: 1.5em;
            color: #f39c12;
            font-weight: bold;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏪 网吧上网计费系统</h1>

        <!-- 登录注册界面 -->
        <div id="authSection" class="section active">
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('login', event)">登录</div>
                <div class="tab" onclick="switchTab('register', event)">注册</div>
                <div class="tab" onclick="switchTab('admin', event)">管理员</div>
            </div>

            <!-- 登录表单 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码">
                </div>
                <button class="btn" onclick="userLogin()">登录</button>
            </div>

            <!-- 注册表单 -->
            <div id="registerForm" style="display:none;">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="请输入密码">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="regPassword2" placeholder="请再次输入密码">
                </div>
                <button class="btn" onclick="userRegister()">注册</button>
            </div>

            <!-- 管理员登录 -->
            <div id="adminForm" style="display:none;">
                <div class="form-group">
                    <label>管理员密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码">
                </div>
                <button class="btn" onclick="adminLogin()">登录</button>
                <p style="color:#888;margin-top:10px;font-size:12px;">提示: 默认密码为 admin123</p>
            </div>
        </div>

        <!-- 用户主界面 -->
        <div id="userSection" class="section">
            <div class="status-bar">
                <div>
                    <span id="currentUser">用户: -</span>
                </div>
                <div>
                    <span id="currentBalance">余额: 0.00 元</span>
                </div>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="showSection('online')">
                    <div class="menu-icon">💻</div>
                    <div class="menu-title">上机</div>
                </div>
                <div class="menu-item" onclick="offline()">
                    <div class="menu-icon">📴</div>
                    <div class="menu-title">下机</div>
                </div>
                <div class="menu-item" onclick="checkFee()">
                    <div class="menu-icon">💰</div>
                    <div class="menu-title">查费用</div>
                </div>
                <div class="menu-item" onclick="showSection('recharge')">
                    <div class="menu-icon">💳</div>
                    <div class="menu-title">充值</div>
                </div>
                <div class="menu-item" onclick="showSection('history')">
                    <div class="menu-icon">📋</div>
                    <div class="menu-title">记录</div>
                </div>
                <div class="menu-item" onclick="logout()">
                    <div class="menu-icon">🚪</div>
                    <div class="menu-title">退出</div>
                </div>
            </div>
        </div>

        <!-- 上机界面 -->
        <div id="onlineSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">选择电脑</h2>
            
            <div class="pc-legend">
                <div class="legend-item">
                    <div class="legend-color" style="background:#2ecc71;"></div>
                    <span>空闲</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background:#e74c3c;"></div>
                    <span>使用中</span>
                </div>
            </div>

            <div class="pc-grid" id="pcGrid"></div>
            
            <div id="onlineInfo" class="info-card" style="display:none;">
                <h3 style="margin-bottom:15px;">当前上机信息</h3>
                <div class="info-row">
                    <span>电脑编号</span>
                    <span id="onlinePcId">-</span>
                </div>
                <div class="info-row">
                    <span>上机时间</span>
                    <span id="onlineStartTime">-</span>
                </div>
                <div class="info-row">
                    <span>已用时长</span>
                    <span id="onlineDuration" class="timer">0分0秒</span>
                </div>
                <div class="info-row">
                    <span>当前费用</span>
                    <span id="onlineFee">0.00 元</span>
                </div>
            </div>
            
            <div id="selectPcInfo" style="text-align:center;margin:20px 0;">
                <p>请从上方选择一个空闲的电脑上机</p>
            </div>
        </div>

        <!-- 充值界面 -->
        <div id="rechargeSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">账户充值</h2>
            
            <div class="balance-display">
                当前余额: <span id="rechargeBalance">0.00</span> 元
            </div>

            <h3 style="margin:20px 0;text-align:center;">快捷充值</h3>
            <div class="recharge-amounts">
                <button class="recharge-btn" onclick="selectRecharge(10)">10元</button>
                <button class="recharge-btn" onclick="selectRecharge(20)">20元</button>
                <button class="recharge-btn" onclick="selectRecharge(50)">50元</button>
                <button class="recharge-btn" onclick="selectRecharge(100)">100元</button>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>自定义金额</label>
                <input type="number" id="customAmount" placeholder="请输入充值金额">
            </div>

            <button class="btn" onclick="doRecharge()">确认充值</button>
        </div>

        <!-- 消费记录界面 -->
        <div id="historySection" class="section">
            <button class="btn btn-secondary" onclick="showSection('user')">← 返回</button>
            <h2 style="margin:20px 0;">消费记录</h2>
            <div class="history-list" id="historyList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 管理员界面 -->
        <div id="adminSection" class="section">
            <div class="status-bar">
                <span>管理员模式</span>
                <button class="btn btn-danger" onclick="adminLogout()">退出</button>
            </div>

            <div class="menu-grid">
                <div class="menu-item" onclick="showSection('adminUsers')">
                    <div class="menu-icon">👥</div>
                    <div class="menu-title">用户列表</div>
                </div>
                <div class="menu-item" onclick="showSection('adminRecords')">
                    <div class="menu-icon">📊</div>
                    <div class="menu-title">消费记录</div>
                </div>
                <div class="menu-item" onclick="showSection('adminStats')">
                    <div class="menu-icon">📈</div>
                    <div class="menu-title">系统统计</div>
                </div>
            </div>
        </div>

        <!-- 用户列表 -->
        <div id="adminUsersSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">所有用户</h2>
            <div id="usersTable"></div>
        </div>

        <!-- 消费记录 -->
        <div id="adminRecordsSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">所有消费记录</h2>
            <div id="recordsTable"></div>
        </div>

        <!-- 系统统计 -->
        <div id="adminStatsSection" class="section">
            <button class="btn btn-secondary" onclick="showSection('admin')">← 返回</button>
            <h2 style="margin:20px 0;">系统统计</h2>
            <div class="info-card">
                <div class="info-row">
                    <span>用户总数</span>
                    <span id="statUsers">0</span>
                </div>
                <div class="info-row">
                    <span>消费记录</span>
                    <span id="statRecords">0</span>
                </div>
                <div class="info-row">
                    <span>总收入</span>
                    <span id="statRevenue">0.00 元</span>
                </div>
                <div class="info-row">
                    <span>当前在线</span>
                    <span id="statOnline">0 人</span>
                </div>
                <div class="info-row">
                    <span>空闲电脑</span>
                    <span id="statFree">0 台</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示弹窗 -->
    <div id="toast" class="modal">
        <div class="modal-content" style="text-align:center;">
            <p id="toastMessage" style="font-size:18px;margin-bottom:20px;"></p>
            <button class="btn" onclick="closeToast()">确定</button>
        </div>
    </div>

    <script src="app.js"></script>

</body>
</html>
